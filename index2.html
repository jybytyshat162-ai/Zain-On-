<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>زين أون لاين - المحادثة الفورية</title>
    <link rel="stylesheet" href="style2.css"
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>

    <header class="chat-header">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <span class="material-symbols-rounded">arrow_forward</span>
        </button>
        <div class="user-info">
            <div class="avatar">
                <span class="material-symbols-rounded">support_agent</span>
            </div>
            <div>
                <h4>الدعم الفني - زين أون لاين</h4>
                <p class="status">متصل الآن • خدمة العملاء</p>
            </div>
        </div>
    </header>

    <main class="chat-container" id="chatContainer">
        <div class="message system">
            <p>مرحباً بك في مركز خدمة عملاء زين أون لاين. أرسل إشعار التحويل هنا وسيتم مراجعة طلبك وتفعيله فوراً من قبل الإدارة.</p>
        </div>
    </main>

    <footer class="chat-footer">
        <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا...">
        <button id="sendMsgBtn">
            <span class="material-symbols-rounded">send</span>
        </button>
    </footer>

  <script type="module" src="script2.js"></script>
</body>
</html>
