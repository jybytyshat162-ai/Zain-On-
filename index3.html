<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600&display=swap" rel="stylesheet">
    <style>
        /* ضبط الشاشة بالكامل لتكون الخلفية داكنة وفخمة وتبرز إضاءة النيون */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #0d0f12; /* خلفية داكنة فخمة لإبراز النيون البرتقالي */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            gap: 35px;
        }

        /* حاوية الأنيميشن الدائري */
        .loader-neon-box {
            position: relative;
            width: 130px;
            height: 130px;
        }
        
        /* توزيع الـ 16 ذراع بشكل دائري مضبوط */
        .loader-neon-box span {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: rotate(calc(22.5deg * var(--i)));
        }
        
        /* تصميم ذراع النيون المضيء (نفس الصورة تماماً) */
        .loader-neon-box span::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 24px;
            background: linear-gradient(180deg, #FF6600, #ff8533);
            border-radius: 6px;
            /* تأثير توهج النيون الفخم باللون البرتقالي الخاص بمتجرك */
            box-shadow: 0 0 12px #FF6600, 0 0 25px #FF6600, 0 0 40px #FF6600;
            animation: animateNeonLoader 1.2s linear infinite;
            animation-delay: calc(0.075s * var(--i));
        }
        
        /* حركة الدوران النيون المتناوبة */
        @keyframes animateNeonLoader {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            80%, 100% {
                transform: scale(1);
                opacity: 0.05;
            }
        }
        
        /* نص التحميل المضيء أسفل الدائرة */
        .loader-neon-text {
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #FF6600;
            text-shadow: 0 0 10px rgba(255, 102, 0, 0.4);
            letter-spacing: 0.5px;
            animation: pulseText 1.5s ease-in-out infinite;
        }
        
        @keyframes pulseText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="loader-neon-box">
        <span style="--i:0;"></span>
        <span style="--i:1;"></span>
        <span style="--i:2;"></span>
        <span style="--i:3;"></span>
        <span style="--i:4;"></span>
        <span style="--i:5;"></span>
        <span style="--i:6;"></span>
        <span style="--i:7;"></span>
        <span style="--i:8;"></span>
        <span style="--i:9;"></span>
        <span style="--i:10;"></span>
        <span style="--i:11;"></span>
        <span style="--i:12;"></span>
        <span style="--i:13;"></span>
        <span style="--i:14;"></span>
        <span style="--i:15;"></span>
    </div>

    <div class="loader-neon-text"></div>
    <script src="language.js"></script>

</body>
</html>
