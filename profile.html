<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">حسابي | زين أون لاين</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #f8f9fa, #eef0f2);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .profile-card {
            background: #ffffff;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
        }
        
        .profile-card::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 102, 0, 0.06), transparent 70%);
            border-radius: 50%;
        }
        
        .profile-card::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 102, 0, 0.04), transparent 70%);
            border-radius: 50%;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        
        .profile-header .back-btn {
            color: #888;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.3s ease;
        }
        
        .profile-header .back-btn:hover {
            color: #FF6600;
        }
        
        .profile-header .back-btn span {
            font-size: 20px;
        }
        
        .profile-header h2 {
            font-size: 18px;
            font-weight: 800;
            color: #1a1a2e;
        }
        
        .avatar-section {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        
        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }
        
        .avatar-wrapper img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #FF6600;
            padding: 4px;
            background: #fff;
            box-shadow: 0 8px 30px rgba(255, 102, 0, 0.2);
        }
        
        .avatar-wrapper .edit-avatar-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #FF6600;
            border: 2px solid #fff;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 102, 0, 0.3);
        }
        
        .avatar-wrapper .edit-avatar-btn:active {
            transform: scale(0.9);
        }
        
        .avatar-wrapper .edit-avatar-btn span {
            font-size: 16px;
        }
        
        .avatar-section .user-name {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
            margin-top: 10px;
        }
        
        .avatar-section .user-role {
            font-size: 12px;
            color: #888;
            font-weight: 600;
        }
        
        .avatar-section .user-role span {
            color: #FF6600;
        }
        
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }
        
        .info-item {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        
        .info-item:hover {
            border-color: #FF6600;
            background: #fff8ed;
        }
        
        .info-item .info-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 102, 0, 0.08);
            color: #FF6600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .info-item .info-icon span {
            font-size: 20px;
        }
        
        .info-item .info-content {
            flex: 1;
        }
        
        .info-item .info-content .label {
            font-size: 11px;
            color: #888;
            font-weight: 600;
        }
        
        .info-item .info-content .value {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
        }
        
        .info-item .info-edit-btn {
            color: #FF6600;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            padding: 4px 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        
        .info-item .info-edit-btn:hover {
            background: rgba(255, 102, 0, 0.08);
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            z-index: 1;
        }
        
        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .action-btn:active {
            transform: scale(0.97);
        }
        
        .action-btn.logout {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        .action-btn.logout:hover {
            background: #fee2e2;
        }
        
        .action-btn.delete {
            background: #dc2626;
            color: #fff;
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.25);
        }
        
        .action-btn.delete:hover {
            background: #b91c1c;
        }
        
        .action-btn .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        .action-btn.loading .spinner {
            display: inline-block;
        }
        
        .action-btn.loading .btn-text {
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .edit-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        
        .edit-modal-overlay.active {
            display: flex;
        }
        
        .edit-modal {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 28px;
            padding: 28px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: modalSlideUp 0.3s ease;
        }
        
        @keyframes modalSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .edit-modal .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .edit-modal .modal-header h3 {
            font-size: 18px;
            font-weight: 800;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .edit-modal .modal-header h3 span {
            color: #FF6600;
        }
        
        .edit-modal .modal-close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #f0f1f4;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        
        .edit-modal .modal-close-btn:hover {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .edit-modal .modal-close-btn span {
            font-size: 18px;
        }
        
        .edit-modal .input-group {
            margin-bottom: 16px;
        }
        
        .edit-modal .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #444;
            margin-bottom: 5px;
        }
        
        .edit-modal .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8eaed;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            background: #fafbfc;
            color: #1a1a2e;
            direction: rtl;
        }
        
        .edit-modal .input-group input:focus {
            border-color: #FF6600;
            box-shadow: 0 0 0 4px rgba(255, 102, 0, 0.08);
        }
        
        .edit-modal .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .edit-modal .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .edit-modal .modal-actions .modal-cancel {
            background: #f0f1f4;
            color: #555;
        }
        
        .edit-modal .modal-actions .modal-save {
            background: linear-gradient(145deg, #FF6600, #e65c00);
            color: #fff;
            box-shadow: 0 4px 16px rgba(255, 102, 0, 0.25);
        }
        
        .edit-modal .modal-actions button:active {
            transform: scale(0.97);
        }
        
        .delete-account-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f0;
        }
        
        .delete-account-section .delete-note {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            text-align: center;
        }
        
        /* ===== النوافذ المنبثقة الفخمة ===== */
        .custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 999999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .custom-modal-overlay.active { display: flex; }
        
        .custom-modal-box {
            background: white;
            border-radius: 28px;
            padding: 32px 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.3s ease;
            text-align: center;
            position: relative;
        }
        
        .custom-modal-box .modal-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }
        .custom-modal-box .modal-icon.success {
            background: #e6f7ed;
            color: #10b981;
        }
        .custom-modal-box .modal-icon.error {
            background: #fee2e2;
            color: #dc2626;
        }
        .custom-modal-box .modal-icon.warning {
            background: #fff0e6;
            color: #FF6600;
        }
        .custom-modal-box .modal-icon span { font-size: 40px; }
        
        .custom-modal-box h3 {
            font-size: 20px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .custom-modal-box p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .custom-modal-box .modal-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
        }
        .custom-modal-box .modal-btn.success {
            background: linear-gradient(145deg, #10b981, #059669);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }
        .custom-modal-box .modal-btn.error {
            background: linear-gradient(145deg, #dc2626, #b91c1c);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.3);
        }
        .custom-modal-box .modal-btn.warning {
            background: linear-gradient(145deg, #FF6600, #e65c00);
            box-shadow: 0 6px 20px rgba(255, 102, 0, 0.3);
        }
        .custom-modal-box .modal-btn:active { transform: scale(0.97); }
        
        .custom-modal-box .modal-close-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #f5f6fa;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #666;
            transition: all 0.3s ease;
        }
        .custom-modal-box .modal-close-btn:hover { background: #fee2e2; color: #dc2626; }
        .custom-modal-box .modal-close-btn span { font-size: 18px; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(30px) scale(0.95); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        
        @media (max-width: 480px) {
            .profile-card {
                padding: 24px 16px;
                border-radius: 24px;
            }
            
            .avatar-wrapper img {
                width: 80px;
                height: 80px;
            }
            
            .info-item {
                padding: 12px 14px;
            }
            
            .action-btn {
                padding: 12px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="profile-card" id="profileCard">
    <div class="profile-header">
        <a href="index.html" class="back-btn">
            <span class="material-symbols-rounded">arrow_forward</span>
            <span id="backText">العودة</span>
        </a>
        <h2>👤 <span id="profileTitle">حسابي</span></h2>
        <div style="width: 70px;"></div>
    </div>
    
    <div class="avatar-section">
        <div class="avatar-wrapper">
            <img id="avatarImg" src="" alt="صورة المستخدم">
            <button class="edit-avatar-btn" id="editAvatarBtn" title="تغيير الصورة">
                <span class="material-symbols-rounded">photo_camera</span>
            </button>
        </div>
        <div class="user-name" id="userName">اسم المستخدم</div>
        <div class="user-role">🎖️ <span id="userRole">عميل مميز</span></div>
    </div>
    
    <div class="info-grid">
        <div class="info-item">
            <div class="info-icon"><span class="material-symbols-rounded">person</span></div>
            <div class="info-content">
                <div class="label" id="labelFullName">الاسم الكامل</div>
                <div class="value" id="displayName">---</div>
            </div>
            <button class="info-edit-btn" data-field="fullName" id="editFullNameBtn">تعديل</button>
        </div>
        
        <div class="info-item">
            <div class="info-icon"><span class="material-symbols-rounded">mail</span></div>
            <div class="info-content">
                <div class="label" id="labelEmail">البريد الإلكتروني</div>
                <div class="value" id="displayEmail">---</div>
            </div>
            <button class="info-edit-btn" data-field="email" id="editEmailBtn">تعديل</button>
        </div>
        
        <div class="info-item">
            <div class="info-icon"><span class="material-symbols-rounded">phone_android</span></div>
            <div class="info-content">
                <div class="label" id="labelPhone">رقم الجوال</div>
                <div class="value" id="displayPhone">---</div>
            </div>
            <button class="info-edit-btn" data-field="phone" id="editPhoneBtn">تعديل</button>
        </div>
        
        <div class="info-item">
            <div class="info-icon"><span class="material-symbols-rounded">calendar_today</span></div>
            <div class="info-content">
                <div class="label" id="labelDate">تاريخ التسجيل</div>
                <div class="value" id="displayDate">---</div>
            </div>
        </div>
        
        <div class="info-item">
            <div class="info-icon"><span class="material-symbols-rounded">fingerprint</span></div>
            <div class="info-content">
                <div class="label" id="labelUserId">معرف المستخدم</div>
                <div class="value" id="displayUserId" style="font-size:12px; color:#888;">---</div>
            </div>
        </div>
    </div>
    
    <div class="action-buttons">
        <button class="action-btn logout" id="logoutBtn">
            <span class="material-symbols-rounded">logout</span>
            <span class="btn-text" id="logoutText">تسجيل الخروج</span>
        </button>
        
        <button class="action-btn delete" id="deleteAccountBtn">
            <span class="material-symbols-rounded">delete_forever</span>
            <span class="btn-text" id="deleteText">حذف الحساب نهائياً</span>
        </button>
    </div>
</div>

<div class="edit-modal-overlay" id="editModal">
    <div class="edit-modal">
        <div class="modal-header">
            <h3><span class="material-symbols-rounded">edit</span> <span id="editTitle">تعديل</span> <span id="editFieldName">الاسم</span></h3>
            <button class="modal-close-btn" id="closeEditModal">
                <span class="material-symbols-rounded">close</span>
            </button>
        </div>
        
        <form id="editForm">
            <div class="input-group">
                <label id="editLabel">القيمة الجديدة</label>
                <input type="text" id="editInput" placeholder="أدخل القيمة الجديدة" required>
            </div>
            
            <div class="modal-actions">
                <button type="button" class="modal-cancel" id="cancelEdit"><span id="cancelText">إلغاء</span></button>
                <button type="submit" class="modal-save"><span id="saveText">حفظ التعديل</span></button>
            </div>
        </form>
        
        <div class="delete-account-section" id="deleteConfirmSection" style="display:none;">
            <p class="delete-note" id="deleteNote">⚠️ هذا الإجراء نهائي ولا يمكن التراجع عنه</p>
            <div class="modal-actions">
                <button type="button" class="modal-cancel" id="cancelDelete"><span id="cancelDeleteText">إلغاء</span></button>
                <button type="button" class="modal-save" id="confirmDeleteBtn" style="background:#dc2626; box-shadow:0 4px 16px rgba(220,38,38,0.25);">
                    <span id="confirmDeleteText">تأكيد الحذف</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ===== النوافذ المنبثقة الفخمة ===== -->
<div class="custom-modal-overlay" id="customModal">
    <div class="custom-modal-box">
        <button class="modal-close-btn" onclick="closeCustomModal()">
            <span class="material-symbols-rounded">close</span>
        </button>
        <div class="modal-icon warning" id="modalIcon">
            <span class="material-symbols-rounded">warning</span>
        </div>
        <h3 id="modalTitle">تنبيه</h3>
        <p id="modalMessage">هذه رسالة تجريبية</p>
        <button class="modal-btn warning" id="modalBtn" onclick="closeCustomModal()">حسناً</button>
    </div>
</div>

let currentUserId = null;
let currentUserData = {};
let editingField = '';

// ===== دوال النافذة المنبثقة الفخمة =====
function showCustomModal(title, message, type = 'warning', btnText = null) {
    const modal = document.getElementById('customModal');
    const icon = document.getElementById('modalIcon');
    const titleEl = document.getElementById('modalTitle');
    const msgEl = document.getElementById('modalMessage');
    const btn = document.getElementById('modalBtn');
    
    const types = {
        success: { class: 'success', icon: 'check_circle', btnClass: 'success' },
        error: { class: 'error', icon: 'error', btnClass: 'error' },
        warning: { class: 'warning', icon: 'warning', btnClass: 'warning' }
    };
    
    const config = types[type] || types.warning;
    
    icon.className = `modal-icon ${config.class}`;
    icon.querySelector('span').textContent = config.icon;
    titleEl.textContent = title;
    msgEl.textContent = message;
    btn.className = `modal-btn ${config.btnClass}`;
    btn.textContent = btnText || t.modalOk;
    
    modal.classList.add('active');
}

window.closeCustomModal = function() {
    document.getElementById('customModal').classList.remove('active');
};

// إغلاق عند الضغط خارج النافذة
document.getElementById('customModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
});

// ===== التحقق من تسجيل الدخول =====
function checkSessionAndUpdate() {
    const userId = localStorage.getItem('zain_user_id');
    console.log('🔍 التحقق من الجلسة في profile.html:', userId);
    
    if (!userId) {
        console.log('🚫 لا توجد جلسة');
        
        // إرسال إشارات
        try {
            const channel = new BroadcastChannel('auth_channel');
            channel.postMessage({ type: 'logout', timestamp: Date.now() });
            channel.close();
        } catch (e) {}
        
        localStorage.setItem('logout_signal', 'true');
        sessionStorage.setItem('logout_signal', 'true');
        window.dispatchEvent(new Event('storage'));
        
        // عرض نافذة منبثقة
        showCustomModal(t.alertNoSession, '', 'warning');
        
        // التوجيه بعد 2 ثانية
        setTimeout(() => {
            const url = new URL('index.html', window.location.origin);
            url.searchParams.set('logout', Date.now().toString());
            window.location.href = url.toString();
        }, 2000);
        
    } else {
        console.log('✅ جلسة نشطة:', userId);
        currentUserId = userId;
        loadUserData();
    }
}

// ===== جلب بيانات المستخدم =====
async function loadUserData() {
    try {
        const snapshot = await get(ref(db, `users/${currentUserId}`));
        if (!snapshot.exists()) {
            showCustomModal(t.alertNoData, t.alertNoDataDesc, 'error');
            
            localStorage.removeItem('zain_user_id');
            localStorage.removeItem('zain_user_name');
            localStorage.removeItem('zain_user_email');
            localStorage.removeItem('zain_user_phone');
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 2000);
            return;
        }
        
        currentUserData = snapshot.val();
        
        // تحديث الواجهة
        userName.textContent = currentUserData.fullName || 'مستخدم';
        displayName.textContent = currentUserData.fullName || '---';
        displayEmail.textContent = currentUserData.email || '---';
        displayPhone.textContent = currentUserData.phone || '---';
        displayUserId.textContent = currentUserData.userId || '---';
        
        if (currentUserData.createdAtDate) {
            const date = new Date(currentUserData.createdAtDate);
            displayDate.textContent = date.toLocaleDateString('ar-EG', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
        
        if (currentUserData.avatar) {
            avatarImg.src = currentUserData.avatar;
        } else {
            avatarImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUserData.fullName || 'U')}&background=FF6600&color=fff&size=200`;
        }
        
        console.log('✅ تم تحميل بيانات المستخدم');
    } catch (error) {
        console.error('❌ خطأ في تحميل البيانات:', error);
        showCustomModal(t.alertLoadError, '', 'error');
    }
}

// ===== تنفيذ التحقق =====
checkSessionAndUpdate();

// ===== فتح نافذة التعديل =====
document.querySelectorAll('.info-edit-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        const field = this.dataset.field;
        editingField = field;
        
        const fieldNames = {
            fullName: t.fullName,
            email: t.email,
            phone: t.phone
        };
        
        const fieldValues = {
            fullName: currentUserData.fullName || '',
            email: currentUserData.email || '',
            phone: currentUserData.phone || ''
        };
        
        editFieldName.textContent = fieldNames[field] || field;
        editLabel.textContent = `${t.editLabel} (${fieldNames[field]})`;
        editInput.value = fieldValues[field] || '';
        editInput.placeholder = t.editPlaceholder;
        
        deleteConfirmSection.style.display = 'none';
        editModal.classList.add('active');
        setTimeout(() => editInput.focus(), 300);
    });
});

// ===== إغلاق نافذة التعديل =====
function closeModal() {
    editModal.classList.remove('active');
    deleteConfirmSection.style.display = 'none';
}

closeEditModal.addEventListener('click', closeModal);
cancelEdit.addEventListener('click', closeModal);
editModal.addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// ===== حفظ التعديل =====
editForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const newValue = editInput.value.trim();
    if (!newValue) {
        showCustomModal(t.alertEmpty, '', 'warning');
        return;
    }
    
    if (editingField === 'email' && !newValue.includes('@')) {
        showCustomModal(t.alertEmail, '', 'error');
        return;
    }
    
    if (editingField === 'phone' && !/^[0-9]{9}$/.test(newValue)) {
        showCustomModal(t.alertPhone, '', 'error');
        return;
    }
    
    try {
        await update(ref(db, `users/${currentUserId}`), {
            [editingField]: newValue
        });
        
        currentUserData[editingField] = newValue;
        
        if (editingField === 'fullName') {
            localStorage.setItem('zain_user_name', newValue);
            userName.textContent = newValue;
            displayName.textContent = newValue;
        } else if (editingField === 'email') {
            localStorage.setItem('zain_user_email', newValue);
            displayEmail.textContent = newValue;
        } else if (editingField === 'phone') {
            displayPhone.textContent = newValue;
        }
        
        if (editingField === 'fullName') {
            avatarImg.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(newValue)}&background=FF6600&color=fff&size=200`;
        }
        
        closeModal();
        showCustomModal(t.alertSuccess, '', 'success');
        
    } catch (error) {
        console.error('❌ خطأ في التحديث:', error);
        showCustomModal(t.alertError, '', 'error');
    }
});

    editFieldName.textContent = t.delete;
    editLabel.textContent = '⚠️ ' + t.deleteNote;

    editForm.querySelector('.modal-actions').style.display = 'none';
    editModal.classList.add('active');

    deleteConfirmSection.style.display = 'none';
    editInput.style.display = 'block';
    editForm.querySelector('.modal-actions').style.display = 'flex';

});

// ===== تغيير الصورة الرمزية =====

        userName.textContent = name;
        displayName.textContent = name;
        currentUserData.fullName = name;
    }
